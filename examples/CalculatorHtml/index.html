<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NetzWirbel Calculator (HTML/CSS Bound)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        
        .calculator-container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 24px;
            width: 320px;
        }

        .calc-display {
            width: 100%;
            height: 60px;
            background-color: #f8f9fa;
            border: none;
            border-radius: 8px;
            text-align: right;
            font-size: 28px;
            padding: 10px 15px;
            margin-bottom: 20px;
            box-sizing: border-box;
            color: #333;
            font-weight: 500;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }

        .calc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .calc-btn {
            border: none;
            border-radius: 8px;
            height: 50px;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background-color: #e9ecef;
            color: #495057;
        }

        .calc-btn:hover {
            background-color: #dee2e6;
            transform: translateY(-1px);
        }

        .calc-btn:active {
            transform: translateY(1px);
            background-color: #ced4da;
        }

        .calc-btn.operator {
            background-color: #4dabf7;
            color: white;
        }

        .calc-btn.operator:hover {
            background-color: #339af0;
        }

        .calc-btn.clear {
            background-color: #ff6b6b;
            color: white;
        }

        .calc-btn.clear:hover {
            background-color: #fa5252;
        }

        .calc-btn.equals {
            background-color: #51cf66;
            color: white;
            grid-column: span 4;
        }

        .calc-btn.equals:hover {
            background-color: #40c057;
        }
    </style>
</head>
<body>
    <div class="calculator-container">
        <input type="text" id="display" class="calc-display" value="0" readonly>
        <div class="calc-grid">
            <button class="calc-btn" data-val="7">7</button>
            <button class="calc-btn" data-val="8">8</button>
            <button class="calc-btn" data-val="9">9</button>
            <button class="calc-btn operator" data-val="/">/</button>

            <button class="calc-btn" data-val="4">4</button>
            <button class="calc-btn" data-val="5">5</button>
            <button class="calc-btn" data-val="6">6</button>
            <button class="calc-btn operator" data-val="*">*</button>

            <button class="calc-btn" data-val="1">1</button>
            <button class="calc-btn" data-val="2">2</button>
            <button class="calc-btn" data-val="3">3</button>
            <button class="calc-btn operator" data-val="-">-</button>

            <button class="calc-btn clear" data-val="C">C</button>
            <button class="calc-btn" data-val="0">0</button>
            <button class="calc-btn" data-val=".">.</button>
            <button class="calc-btn operator" data-val="+">+</button>

            <button class="calc-btn equals" data-val="=">=</button>
        </div>
    </div>

    <!-- The C++ WebAssembly module will be loaded here -->
    <script src="/js/netzwirbel_bridge.js"></script>
    <script>
        const capacity = 1024;
        
        const config = {
            onRuntimeInitialized: function() {
                const cppToJsOffset = Module._malloc(capacity * 32 + 24);
                const jsToCppOffset = Module._malloc(capacity * 64 + 24);
                
                const bridge = new NetzWirbelBridge(
                    Module.wasmMemory, 
                    cppToJsOffset, 
                    jsToCppOffset, 
                    capacity,
                    Module._malloc,
                    Module._free
                );
                
                startNetzWirbelLoop(bridge);
                
                Module.ccall('netzwirbel_init', null, ['number', 'number', 'number'], 
                    [cppToJsOffset, jsToCppOffset, capacity]);
                
                setInterval(() => {
                    Module.ccall('netzwirbel_tick', null, ['number'], [performance.now()]);
                }, 16);
            }
        };
        var Module = config;
    </script>
    <script src="CalculatorHtml.js"></script>
</body>
</html>
